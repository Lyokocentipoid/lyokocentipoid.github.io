<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfoli de Lyokocentipoid</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  <!-- Canvas per a les partícules (fons fix) -->
  <canvas id="particles-canvas"></canvas>

  <!-- Barra de navegació superior -->
  <nav id="navbar">
    <div class="nav-inner">
      <ul class="nav-links">
        <li>
          <a href="generador_mails.html" class="nav-link nav-link--colorful">
            <span class="nav-link__icon">✉</span>
            <span class="nav-link__text">Generador de Correus</span>
          </a>
        </li>
        <!-- Afegeix més nav-link aquí -->
      </ul>
    </div>

  <style>
    /* ─── NAVBAR ─────────────────────────────────────────────────────── */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 0 2rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border-bottom: none;
      pointer-events: none;
    }

    .nav-inner {
      width: 100%;
      max-width: 960px;
      pointer-events: all;
    }

    .nav-links {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    /* Botó: pastilla amb cristall i gradient coherent amb style.css */
    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1.2rem;
      border-radius: 999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-decoration: none;
      white-space: nowrap;
      transition: transform 0.25s ease, box-shadow 0.25s ease;

      /* Cristall translúcid */
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(10px) saturate(1.4);
      -webkit-backdrop-filter: blur(10px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);

      /* Color del text: gradient com el h1 del style.css */
      color: transparent;
      background-image: linear-gradient(rgba(255,255,255,0.22), rgba(255,255,255,0.22)),
                        linear-gradient(90deg, #00897b, #0288d1, #00acc1);
      background-clip: padding-box, text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Hack: l'icon no hereta el clip de text */
    .nav-link__icon {
      font-size: 1rem;
      line-height: 1;
      background: linear-gradient(90deg, #00897b, #0288d1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-link:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(16px) saturate(1.6);
      -webkit-backdrop-filter: blur(16px) saturate(1.6);
      box-shadow: 0 6px 20px rgba(2, 136, 193, 0.18), 0 2px 8px rgba(0,0,0,0.08);
      border-color: rgba(255, 255, 255, 0.7);
    }

    .nav-link:active {
      transform: scale(0.97);
    }

  </style>

  <header>
    <img src="/assets/img/foto-perfil.jpg" alt="Foto de Lyokocentipoid" class="foto-rodona">
    <h1 id="typewriter"></h1>
    <p class="subtitle">Espai de projectes web educatius</p>
  </header>

  <section id="projectes">
    <h2 style="color: #8A0C18;">Projectes educatius - Matemàtiques</h2>

    <a href="/proporcionalitat1eso/" class="projecte-card">
      <h3>Proporcionalitat i Percentatges de 1r ESO</h3>
      <p>Només Fitxes</p>
    </a>

    <a href="/geometria1eso/" class="projecte-card">
      <h3>Geometria de 1r ESO</h3>
      <p>Web de conceptes bàsics de geometria</p>
    </a>

    <a href="/grafiques/" class="projecte-card">
      <h3>Gràfiques de 1r ESO</h3>
      <p>Web per treballar amb gràfiques i estadística bàsica</p>
    </a>
    <!-- Afegeix més cards aquí quan tinguis més projectes -->
  </section>

  <script>
    // ─── 1. PARTÍCULES ────────────────────────────────────────────────────────
    const canvas = document.getElementById('particles-canvas');
    const ctx    = canvas.getContext('2d');
    let particles = [];
    const NUM_PARTICLES = 80;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function randomBetween(a, b) { return a + Math.random() * (b - a); }

    class Particle {
      constructor() { this.reset(true); }

      reset(initial = false) {
        this.x           = randomBetween(0, canvas.width);
        this.y           = initial ? randomBetween(0, canvas.height) : canvas.height + 5;
        this.r           = randomBetween(0.8, 2.5);
        this.speedX      = randomBetween(-0.4, 0.4);
        this.speedY      = randomBetween(-0.6, -1.8);
        this.angle       = randomBetween(0, Math.PI * 2);
        this.twinkleSpeed = randomBetween(0.01, 0.04);
        this.opacity     = 1;
      }

      update() {
        this.x     += this.speedX;
        this.y     += this.speedY;
        this.angle += this.twinkleSpeed;
        this.opacity = 0.3 + 0.7 * Math.abs(Math.sin(this.angle));

        if (this.y + this.r < 0) this.reset();
        if (this.x - this.r > canvas.width)  this.x = -this.r;
        if (this.x + this.r < 0) this.x = canvas.width + this.r;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;

        // Resplendor exterior (glow)
        const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 4);
        glow.addColorStop(0,   'rgba(255, 255, 255, 0.9)');
        glow.addColorStop(0.4, 'rgba(220, 240, 255, 0.4)');
        glow.addColorStop(1,   'rgba(255, 255, 255, 0)');

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r * 4, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        // Nucli brillant
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 1)';
        ctx.fill();

        ctx.restore();
      }
    }

    for (let i = 0; i < NUM_PARTICLES; i++) particles.push(new Particle());

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();


    // ─── 2. TYPEWRITER ────────────────────────────────────────────────────────
    const TITLE = "Portfoli de Lyokocentipoid";
    const typewriterEl = document.getElementById('typewriter');
    let charIndex = 0;

    function typeWriter() {
      if (charIndex <= TITLE.length) {
        // Inserim el text + cursor com a element independent
        typewriterEl.textContent = TITLE.substring(0, charIndex);
        charIndex++;
        setTimeout(typeWriter, 100);
      }
      // Quan acaba, el cursor CSS segueix parpellejant via ::after o l'span injectat una sola vegada
    }

    window.addEventListener('load', () => {
      // Afegim el cursor com a span fill permanent
      const cursorSpan = document.createElement('span');
      cursorSpan.className = 'cursor';
      typewriterEl.appendChild(cursorSpan);
      setTimeout(typeWriter, 400);
    });


    // ─── 3. ANIMACIÓ D'ENTRADA DE LES CARDS (Intersection Observer) ──────────
    const cards = document.querySelectorAll('.projecte-card');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });

    cards.forEach(card => observer.observe(card));
  </script>

  <script data-goatcounter="https://lyokocentipoid.goatcounter.com/count"
        async src="//gc.zgo.at/count.js">
  </script>

</body>
</html>
